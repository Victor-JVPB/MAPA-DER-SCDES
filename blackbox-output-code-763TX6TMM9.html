<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCDES - Sistema de Controle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff; min-height: 100vh; overflow: hidden; position: relative;
        }
        .logo-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            padding: 14px 28px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; gap: 12px;
        }
        .logo { height: 44px; width: auto; }
        .logo-text { font-size: 1.1rem; font-weight: 600; color: #1f2937; letter-spacing: -0.3px; }
        .map-container { 
            width: 100vw; height: 100vh; padding-top: 80px; box-sizing: border-box; 
            background: #fafbfc; display: flex; align-items: center; justify-content: center;
        }
        #map { 
            width: 98%; height: 98%; border: none; border-radius: 12px; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.05); 
        }
        @media (max-width: 768px) {
            .logo-container { top: 16px; padding: 12px 20px; border-radius: 14px; }
            .logo { height: 38px; } .logo-text { font-size: 1rem; }
            .map-container { padding-top: 75px; } #map { width: 97%; height: 97%; }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="logo-der.png" alt="DER" class="logo">
        <span class="logo-text">SCDES - SISTEMA DE CONTROLE DE DESAPROPRIAÇÃO</span>
    </div>

    <div class="map-container">
        <iframe id="map" src="mapa.html" frameborder="0" allowfullscreen></iframe>
    </div>
</body>
</html>
