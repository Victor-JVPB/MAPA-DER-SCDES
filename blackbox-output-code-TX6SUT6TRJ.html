<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCDES - Sistema de Controle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafbfc; height: 100vh; overflow: hidden; 
        }
        .header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
            padding: 14px 28px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.5);
        }
        .logo { height: 44px; width: auto; }
        .title { font-size: 1.1rem; font-weight: 600; color: #1e2937; }
        .map-frame { 
            width: 100vw; height: 100vh; padding-top: 85px; box-sizing: border-box;
            display: flex; align-items: center; justify-content: center;
        }
        #map { 
            width: 99%; height: 99%; border: none; border-radius: 16px; 
            box-shadow: 0 4px 24px rgba(0,0,0,0.08); 
        }
        @media (max-width: 768px) {
            .header { top: 16px; padding: 12px 20px; } .logo { height: 38px; }
            .title { font-size: 1rem; } .map-frame { padding-top: 75px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo-der.png" alt="DER" class="logo">
        <span class="title">SCDES - SISTEMA DE CONTROLE DE DESAPROPRIAÇÃO</span>
    </div>

    <div class="map-frame">
        <!-- SUBSTITUA pela URL do GitHub -->
        <iframe 
            id="map" 
            src="https://SEU_USUARIO.github.io/scdes-mapa/"
            frameborder="0" 
            allowfullscreen
            sandbox="allow-scripts allow-same-origin allow-popups">
        </iframe>
    </div>
</body>
</html>
