<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCDES - Sistema de Controle</title>

    <!-- CSS do layout -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff; min-height: 100vh; overflow: hidden; position: relative;
        }
        .logo-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            padding: 14px 28px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; gap: 12px;
        }
        .logo { height: 44px; width: auto; }
        .logo-text { font-size: 1.1rem; font-weight: 600; color: #1f2937; }

        .map-container { 
            width: 100vw; height: 100vh; padding-top: 80px;
        }

        #map { 
            width: 98%; height: 98%; margin: auto;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05); 
        }
    </style>

    <!-- CSS do QGIS -->
    <link rel="stylesheet" href="./resources/ol.css">
    <link rel="stylesheet" href="resources/fontawesome-all.min.css">
    <link rel="stylesheet" href="resources/horsey.min.css">
    <link rel="stylesheet" href="resources/ol-search-layer.min.css">
    <link rel="stylesheet" href="resources/photon-geocoder-autocomplete.min.css">
    <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
    <link rel="stylesheet" href="./resources/qgis2web.css">

    <style>
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #444!important;
        }
    </style>
</head>

<body>

    <!-- LOGO -->
    <div class="logo-container">
        <img src="logo-der.png" alt="DER" class="logo">
        <span class="logo-text">SCDES - SISTEMA DE CONTROLE DE DESAPROPRIAÇÃO</span>
    </div>

    <!-- MAPA -->
    <div class="map-container">
        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>
    </div>

    <!-- JS QGIS -->
    <script src="resources/qgis2web_expressions.js"></script>
    <script src="resources/functions.js"></script>
    <script src="resources/ol.js"></script>
    <script src="resources/horsey.min.js"></script>
    <script src="resources/ol-search-layer.js"></script>
    <script src="resources/ol-layerswitcher.js"></script>
    <script src="resources/photon-geocoder-autocomplete.min.js"></script>

    <!-- CAMADAS -->
    <script src="layers/MARCADORESGERAIS_3.js"></script>
    <script src="layers/SP425PENPOLISCLEMENTINA_4.js"></script>
    <script src="layers/SP461VOTUPORANGALVARESFLORENCECARDOSO_5.js"></script>
    <script src="layers/SP563ANDRADINA_6.js"></script>
    <script src="layers/SP123TAUBATCAMPOSDOJORDO_7.js"></script>

    <!-- ESTILOS -->
    <script src="styles/MARCADORESGERAIS_3_style.js"></script>
    <script src="styles/SP425PENPOLISCLEMENTINA_4_style.js"></script>
    <script src="styles/SP461VOTUPORANGALVARESFLORENCECARDOSO_5_style.js"></script>
    <script src="styles/SP563ANDRADINA_6_style.js"></script>
    <script src="styles/SP123TAUBATCAMPOSDOJORDO_7_style.js"></script>

    <!-- CONFIG -->
    <script src="layers/layers.js"></script>
    <script src="resources/Autolinker.min.js"></script>
    <script src="resources/qgis2web.js"></script>

</body>
</html>
